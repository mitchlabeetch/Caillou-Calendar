name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-build:
    name: lint · typecheck · build · unit · coverage
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint & type-check
        run: npm run lint

      - name: Unit tests + coverage gate
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Production bundle size check
        run: |
          BUNDLE=$(ls -la dist/assets/index-*.js | awk '{print $5}')
          echo "Bundle size: $BUNDLE bytes"
          # 800 KB hard cap — adjust in lockstep with Phase 3 code-splitting work.
          if [ "$BUNDLE" -gt 819200 ]; then
            echo "::error::Bundle exceeded 800KB budget ($BUNDLE bytes)"
            exit 1
          fi

      - name: Audit dependencies
        run: npm audit --production --audit-level=high
        continue-on-error: true

  visual-regression:
    name: playwright · visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual regression suite
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7