<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caillou Family Calendar</title>
    <meta name="description" content="A friendly family calendar that runs locally or syncs with Supabase." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ff4d15'/%3E%3Crect x='10' y='16' width='44' height='40' rx='6' fill='%23FAF9F6' stroke='%231A1A1A' stroke-width='4'/%3E%3Crect x='10' y='16' width='44' height='12' fill='%231A1A1A'/%3E%3Ccircle cx='22' cy='12' r='3' fill='%231A1A1A'/%3E%3Ccircle cx='42' cy='12' r='3' fill='%231A1A1A'/%3E%3Crect x='20' y='34' width='8' height='8' fill='%23ff4d15'/%3E%3Crect x='32' y='34' width='8' height='8' fill='%2380CBC4'/%3E%3Crect x='20' y='44' width='8' height='8' fill='%23F48FB1'/%3E%3Crect x='32' y='44' width='8' height='8' fill='%23B39DDB'/%3E%3C/svg%3E" />
    <!--
      Content Security Policy. The inline debug overlay has been removed
      so production no longer needs `'unsafe-inline'` for scripts here.
      `'unsafe-inline'` for styles is still required by Framer Motion +
      Tailwind's runtime style application. Scripts stay locked to
      `'self'` with `'wasm-unsafe-eval'` allowed for date-fns and
      chrono-node. Connect-src includes Supabase + Google Calendar APIs.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.googleapis.com; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), camera=(), microphone=(), payment=(), usb=()" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="color-scheme" content="light dark" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
